<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Obará Burguer | Cardápio Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--red:#f05a00;--yellow:#ffd000;--bg:#0b0704;--card:#18100b;--card2:#26170f;--line:#3b2518;--text:#fff7ed;--muted:#b89b84}*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{background:var(--bg);color:var(--text);font-family:Outfit,Arial,sans-serif}.hero{text-align:center;padding:40px 16px 0;background:radial-gradient(circle at top,#5a2100,#0b0704 58%)}.logo{font-family:'Bebas Neue';font-size:clamp(64px,19vw,118px);letter-spacing:5px;line-height:.9;background:linear-gradient(150deg,#fff,var(--yellow),var(--red));-webkit-background-clip:text;background-clip:text;color:transparent}.sub{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:900}.info{font-size:12px;color:#ffe8c7;font-weight:800;margin-top:10px;line-height:1.5}.status{display:inline-flex;gap:8px;align-items:center;margin:18px 0 12px;padding:9px 18px;border-radius:999px;font-weight:900;font-size:13px}.status.open{background:rgba(34,197,94,.13);border:1px solid rgba(34,197,94,.45);color:#4ade80}.status.closed{background:rgba(240,90,0,.13);border:1px solid rgba(240,90,0,.55);color:#ff9b63}.dot{width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 12px currentColor}.hours{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:720px;margin:0 auto 26px}.chip{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:7px 10px;color:var(--muted);font-size:11px;font-weight:800}.chip b{display:block;color:#fff;font-size:12px}.stripe{height:5px;background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 28px,var(--yellow) 28px,var(--yellow) 56px)}.nav{position:sticky;top:0;z-index:5;background:rgba(11,7,4,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);overflow:auto}.nav-inner{display:flex;gap:7px;padding:12px 16px;min-width:max-content}.nav button{border:1.5px solid var(--line);background:transparent;color:var(--muted);border-radius:999px;padding:8px 14px;font:800 13px Outfit;cursor:pointer}.nav button.active,.nav button:hover{background:var(--red);border-color:var(--red);color:#fff}.section{max-width:760px;margin:auto;padding:24px 16px}.title{display:flex;align-items:center;gap:10px;font-family:'Bebas Neue';font-size:32px;letter-spacing:2px;color:var(--yellow)}.title:after{content:"";height:2px;flex:1;background:linear-gradient(90deg,var(--red),transparent)}.hint{font-size:13px;color:var(--muted);font-weight:800;margin-top:3px}.grid{display:flex;flex-direction:column;gap:12px;margin-top:16px}.item{background:var(--card);border:1.5px solid var(--line);border-radius:18px;overflow:hidden;display:grid;grid-template-columns:124px 1fr;min-height:124px}.item.in{border-color:var(--red)}.pic{width:124px;height:124px;position:relative;background:#111;border-right:1px solid var(--line);overflow:hidden}.pic img{width:100%;height:100%;object-fit:cover;display:block}.body{padding:13px 14px}.name{font-size:16px;font-weight:900}.desc{color:var(--muted);font-size:12.5px;font-weight:700;line-height:1.35;margin-top:5px}.badge{display:inline-block;background:var(--red);color:#fff;border-radius:999px;padding:3px 8px;font-size:9px;font-weight:900;text-transform:uppercase;margin-left:5px}.foot{display:flex;align-items:end;justify-content:space-between;margin-top:12px;gap:8px}.price{font-family:'Bebas Neue';font-size:26px;color:var(--yellow);letter-spacing:1px;line-height:1}.add{border:0;background:var(--red);color:#fff;border-radius:999px;padding:9px 13px;font:900 12px Outfit;cursor:pointer;white-space:nowrap}.qty{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:4px 8px}.qty button,.ci button{border:0;background:transparent;color:#fff;font-size:20px;font-weight:900;width:25px;height:25px;cursor:pointer}.qty span,.ci span{font-family:'Bebas Neue';font-size:21px;color:var(--yellow);min-width:18px;text-align:center}.fab{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;min-width:255px;height:58px;border:0;border-radius:999px;background:var(--red);color:#fff;padding:8px 18px 8px 10px;box-shadow:0 10px 34px rgba(240,90,0,.45);font-weight:900;cursor:pointer}.fab.hide{display:none}.fab-icon{width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.25);display:grid;place-items:center;position:relative}.count{position:absolute;right:-5px;top:-5px;background:var(--yellow);color:#000;width:19px;height:19px;border-radius:50%;font-size:11px;display:grid;place-items:center}.fab-total{font-family:'Bebas Neue';font-size:22px;color:var(--yellow)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:20;display:none;align-items:flex-end}.overlay.show{display:flex}.sheet{background:#111;width:100%;max-height:90vh;overflow:auto;border-radius:24px 24px 0 0;border-top:3px solid var(--red)}.sheet-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)}.sheet-title{font-family:'Bebas Neue';font-size:28px;color:var(--yellow);letter-spacing:2px}.close{width:36px;height:36px;border:0;border-radius:50%;background:var(--card2);color:#fff;font-weight:900}.sheet-body{padding:16px 20px 34px}.cart-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line)}.cart-photo{width:54px;height:54px;border-radius:13px;object-fit:cover;background:#222}.cart-info{flex:1}.cart-name{font-size:14px;font-weight:900}.cart-unit{font-size:11px;color:var(--muted);font-weight:800}.ci{display:flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:3px 7px}.subtot{font-family:'Bebas Neue';font-size:20px;min-width:67px;text-align:right}.field{margin-top:18px}.label{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}.input{width:100%;background:var(--card2);border:1.5px solid var(--line);border-radius:13px;color:#fff;padding:13px 14px;font:700 14px Outfit}.toggle,.pay{display:flex;gap:8px;flex-wrap:wrap}.toggle button,.pay button{background:var(--card2);border:2px solid var(--line);color:var(--muted);border-radius:12px;padding:11px 12px;font:800 13px Outfit;cursor:pointer}.toggle button{flex:1}.toggle .active{border-color:var(--red);color:#fff;background:rgba(240,90,0,.14)}.pay .active{border-color:var(--yellow);background:var(--yellow);color:#000}.row{display:flex;justify-content:space-between;margin:8px 0;color:var(--muted);font-weight:800}.grand{border-top:1px solid var(--line);padding-top:12px;margin-top:12px;color:#fff}.grand b{font-family:'Bebas Neue';font-size:31px;color:var(--yellow)}.wa{margin-top:18px;width:100%;border:0;border-radius:15px;background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;padding:17px;font:900 15px Outfit;cursor:pointer}.empty{text-align:center;color:var(--muted);font-weight:900;padding:48px 0}.space{height:92px}footer{text-align:center;padding:20px;border-top:1px solid #171717;color:#6f5544;font-size:11px;font-weight:900}@media(max-width:390px){.item{grid-template-columns:108px 1fr;min-height:108px}.pic{width:108px;height:108px}.body{padding:11px}.desc{font-size:11.5px}.price{font-size:23px}.add{padding:8px 10px}}
</style>
</head>
<body>
<header class="hero"><div class="logo">OBARÁ</div><div class="sub">Hamburgueria • Os melhores lanches da região 🔥</div><div class="info">📍 Jundiapeba, Mogi das Cruzes/SP<br>📲 WhatsApp: 11 99515-4799</div><div id="status" class="status"><span class="dot"></span><span>Verificando...</span></div><div class="hours" id="hours"></div><div class="stripe"></div></header>
<nav class="nav"><div class="nav-inner" id="nav"></div></nav>
<main id="main"></main><div class="space"></div><footer>© Obará Burguer • Cardápio digital por DH Designer Pro</footer>
<button class="fab hide" id="fab" onclick="openCart()"><span style="display:flex;align-items:center;gap:10px"><span class="fab-icon">🛒<span class="count" id="count">0</span></span>Ver pedido</span><span class="fab-total" id="fabTotal">R$ 0,00</span></button>
<div class="overlay" id="overlay" onclick="outsideClose(event)"><div class="sheet"><div class="sheet-head"><div class="sheet-title">🛒 Seu Pedido</div><button class="close" onclick="closeCart()">✕</button></div><div class="sheet-body" id="sheetBody"></div></div></div>
<script>
const CFG={whatsapp:'5511995154799',loja:'Obará Burguer',taxaEntrega:0,horarios:{0:['19:00','04:00'],1:null,2:['19:00','04:00'],3:['19:00','04:00'],4:['19:00','04:00'],5:['19:00','04:00'],6:['19:00','04:00']}};
const DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const cats=[['burgers','🍔 Hambúrgueres','Artesanais, saborosos e no capricho'],['combos','🔥 Combos','Lanche + bebida + acompanhamentos'],['hotdogs','🌭 Hot Dogs','Promoções e opções especiais'],['porcoes','🍟 Porções','Para acompanhar seu pedido'],['bebidas','🥤 Bebidas','Geladas para completar']];
const photos={burger:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=500&q=80',burger2:'https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=500&q=80',combo:'https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=500&q=80',hotdog:'https://images.unsplash.com/photo-1561758033-d89a9ad46330?auto=format&fit=crop&w=500&q=80',fries:'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=500&q=80',drink:'https://images.unsplash.com/photo-1581636625402-29b2a704ef13?auto=format&fit=crop&w=500&q=80'};
const fallback=photos.burger;
const menu={burgers:[['X Tudo Bruto','Hambúrguer completo com queijo, bacon, ovo, salada e molho especial.',29.90,photos.burger,'Mais pedido'],['X Bacon','Burger com queijo, bacon crocante, salada e molho da casa.',24.90,photos.burger2,'Top'],['Obará Gourmet','Burger artesanal com queijo, salada, cebola e molho especial Obará.',32.90,photos.burger,'Gourmet'],['Seu Burguer Favorito','Hambúrguer artesanal da casa, preparado no capricho.',27.90,photos.burger2,'']],combos:[['Combo X Bacon','X Bacon + fritas + refrigerante lata.',39.90,photos.combo,'Promo'],['Combo X Tudo','X Tudo Bruto + fritas + refrigerante lata.',44.90,photos.combo,''],['Casal Pesadão','2 X Tudo Bruto + Coca-Cola 2L + fritas.',89.90,photos.combo,'Casal'],['Combo Burguer','Hambúrguer + batata frita + refrigerante lata.',34.90,photos.combo,'']],hotdogs:[['Combo Hot Dog','Hot dog especial + refrigerante lata + fritas.',29.90,photos.hotdog,'Promo'],['Hot Dog Especial','Hot dog completo com molho, batata palha e acompanhamentos.',19.90,photos.hotdog,'']],porcoes:[['Batata Frita','Porção de batata frita sequinha e crocante.',19.90,photos.fries,''],['Batata com Cheddar e Bacon','Batata frita com cheddar cremoso e bacon.',29.90,photos.fries,'Top']],bebidas:[['Refrigerante Lata','Coca-Cola, Guaraná ou sabores disponíveis.',6.00,photos.drink,''],['Coca-Cola 2L','Refrigerante 2 litros para compartilhar.',14.00,photos.drink,'']]};
let items=[],cart={},delivery='entrega',payment='';Object.keys(menu).forEach(k=>menu[k]=menu[k].map(x=>{let o={id:items.length+1,name:x[0],desc:x[1],price:x[2],photo:x[3],badge:x[4],cat:k};items.push(o);return o}));
const fmt=n=>'R$ '+Number(n).toFixed(2).replace('.',',');
function mins(h){let[a,b]=h.split(':').map(Number);return a*60+b}function status(){let now=new Date(),d=now.getDay(),hm=now.getHours()*60+now.getMinutes(),h=CFG.horarios[d],open=false,msg='Fechado hoje 😴';if(h){let o=mins(h[0]),c=mins(h[1]);if(c<=o)c+=1440;let t=hm;if(hm<o&&c>1440)t+=1440;open=t>=o&&t<c;msg=open?'Aberto agora • fecha às '+h[1]:(hm<o?'Fechado • abre às '+h[0]:'Fechado por hoje 😴')}let el=document.getElementById('status');el.className='status '+(open?'open':'closed');el.querySelector('span:last-child').textContent=msg;document.getElementById('hours').innerHTML=DIAS.map((x,i)=>`<div class="chip">${x}<b>${CFG.horarios[i]?CFG.horarios[i][0]+' às '+CFG.horarios[i][1]:'Fechado'}</b></div>`).join('')}
function render(){nav.innerHTML=cats.map((c,i)=>`<button class="${i?'':'active'}" onclick="go('${c[0]}')" data-cat="${c[0]}">${c[1]}</button>`).join('');main.innerHTML=cats.map(c=>`<section class="section" id="${c[0]}"><div class="title">${c[1]}</div><div class="hint">${c[2]}</div><div class="grid">${menu[c[0]].map(card).join('')}</div></section>`).join('');let obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-cat="${e.target.id}"]`)?.classList.add('active')}}),{threshold:.25});cats.forEach(c=>obs.observe(document.getElementById(c[0])))}
function card(it){return`<article class="item" id="card-${it.id}"><div class="pic"><img src="${it.photo}" alt="${it.name}" onerror="this.src='${fallback}'"></div><div class="body"><div class="name">${it.name}${it.badge?`<span class="badge">${it.badge}</span>`:''}</div><div class="desc">${it.desc}</div><div class="foot"><div class="price">${fmt(it.price)}</div><div id="act-${it.id}"><button class="add" onclick="add(${it.id})">+ Adicionar</button></div></div></div></article>`}
function go(id){document.getElementById(id).scrollIntoView({behavior:'smooth'})}function find(id){return items.find(x=>x.id==id)}function add(id){cart[id]=(cart[id]||0)+1;sync(id);fab()}function rem(id){if(!cart[id])return;cart[id]--;if(cart[id]<=0)delete cart[id];sync(id);fab()}function sync(id){let q=cart[id]||0,a=document.getElementById('act-'+id),c=document.getElementById('card-'+id);if(!a)return;if(q){a.innerHTML=`<div class="qty"><button onclick="rem(${id})">−</button><span>${q}</span><button onclick="add(${id})">+</button></div>`;c.classList.add('in')}else{a.innerHTML=`<button class="add" onclick="add(${id})">+ Adicionar</button>`;c.classList.remove('in')}}function total(){return Object.entries(cart).reduce((s,[id,q])=>s+find(+id).price*q,0)}function count(){return Object.values(cart).reduce((a,b)=>a+b,0)}function fab(){let n=count();document.getElementById('count').textContent=n;document.getElementById('fabTotal').textContent=fmt(total());document.getElementById('fab').classList.toggle('hide',!n)}function openCart(){sheet();overlay.classList.add('show');document.body.style.overflow='hidden'}function closeCart(){overlay.classList.remove('show');document.body.style.overflow=''}function outsideClose(e){if(e.target.id==='overlay')closeCart()}function setDelivery(x){delivery=x;sheet()}function setPay(x){payment=x;sheet()}function cartQty(id,d){d>0?add(id):rem(id);sheet();fab()}
function sheet(){let b=sheetBody;if(!count()){b.innerHTML='<div class="empty">🍔<br>Nada no pedido ainda.</div>';return}let fee=0;b.innerHTML=Object.entries(cart).map(([id,q])=>{let it=find(+id);return`<div class="cart-item"><img class="cart-photo" src="${it.photo}" onerror="this.src='${fallback}'"><div class="cart-info"><div class="cart-name">${it.name}</div><div class="cart-unit">${fmt(it.price)} cada</div></div><div class="ci"><button onclick="cartQty(${id},-1)">−</button><span>${q}</span><button onclick="cartQty(${id},1)">+</button></div><div class="subtot">${fmt(it.price*q)}</div></div>`}).join('')+`<div class="field"><div class="label">👤 Seu nome</div><input id="name" class="input" placeholder="Como devemos te chamar?"></div><div class="field"><div class="label">🛵 Tipo de pedido</div><div class="toggle"><button class="${delivery==='entrega'?'active':''}" onclick="setDelivery('entrega')">Entrega</button><button class="${delivery==='retirada'?'active':''}" onclick="setDelivery('retirada')">Retirada</button></div>${delivery==='entrega'?'<div style="margin-top:10px"><input id="addr" class="input" placeholder="Rua, número, bairro e complemento"></div>':''}</div><div class="field"><div class="label">💳 Pagamento</div><div class="pay">${['dinheiro','pix','credito','debito'].map(p=>`<button class="${payment===p?'active':''}" onclick="setPay('${p}')">${p==='credito'?'crédito':p}</button>`).join('')}</div></div><div class="field"><div class="label">📝 Observações</div><textarea id="notes" class="input" placeholder="Ex: sem cebola, ponto da carne, retirar molho..."></textarea></div><div class="field"><div class="row"><span>Subtotal</span><span>${fmt(total())}</span></div><div class="row"><span>Entrega</span><span>Consultar</span></div><div class="row grand"><span>Total dos itens</span><b>${fmt(total()+fee)}</b></div></div><button class="wa" onclick="sendWA()">Fazer pedido pelo WhatsApp</button>`}
function sendWA(){let n=document.getElementById('name')?.value.trim(),a=document.getElementById('addr')?.value.trim(),notes=document.getElementById('notes')?.value.trim();if(!n)return alert('Informe seu nome.');if(delivery==='entrega'&&!a)return alert('Informe o endereço.');if(!payment)return alert('Escolha o pagamento.');let labels={dinheiro:'Dinheiro',pix:'Pix',credito:'Cartão de crédito',debito:'Cartão de débito'},lines=Object.entries(cart).map(([id,q])=>{let it=find(+id);return`• ${q}x ${it.name} — ${fmt(it.price*q)}`}).join('\n');let msg=`🍔 *NOVO PEDIDO — ${CFG.loja.toUpperCase()}*\n\n👤 *Cliente:* ${n}\n🛵 *Tipo:* ${delivery==='entrega'?'Entrega':'Retirada'}\n${delivery==='entrega'?'📍 *Endereço:* '+a+'\n':''}\n📋 *Itens:*\n${lines}\n\n${notes?'📝 *Obs:* '+notes+'\n\n':''}🧾 *Total dos itens:* ${fmt(total())}\n🛵 *Entrega:* consultar\n💳 *Pagamento:* ${labels[payment]}`;window.open(`https://wa.me/${CFG.whatsapp}?text=${encodeURIComponent(msg)}`,'_blank')}
status();setInterval(status,60000);render();
</script>
</body>
</html>

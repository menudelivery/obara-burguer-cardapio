div class="sheet-body" id="sheetBody"></div></div></div><script>
const CFG={whatsapp:'5511995154799',loja:'Obará Burguer',taxaEntrega:0,horarios:{0:['19:00','04:00'],1:null,2:['19:00','04:00'],3:['19:00','04:00'],4:['19:00','04:00'],5:['19:00','04:00'],6:['19:00','04:00']}};const DIAS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];const cats=[['burgers','🍔 Hambúrgueres'],['combos','🔥 Combos'],['hotdogs','🌭 Hot Dogs'],['porcoes','🍟 Porções'],['bebidas','🥤 Bebidas']];const photos={xtudo:'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=600&q=80',xbacon:'https://images.unsplash.com/photo-1553979459-d2229ba7433b?auto=format&fit=crop&w=600&q=80',gourmet:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=600&q=80',comboBurger:'https://images.unsplash.com/photo-1572802419224-296b0aeee0d9?auto=format&fit=crop&w=600&q=80',comboMeal:'https://images.unsplash.com/photo-1610440042657-612c34d95e9f?auto=format&fit=crop&w=600&q=80',hotdog:'https://images.unsplash.com/photo-1619740455993-9e612b1af08a?auto=format&fit=crop&w=600&q=80',fries:'https://images.unsplash.com/photo-1639024471283-03518883512d?auto=format&fit=crop&w=600&q=80',loadedFries:'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=600&q=80',soda:'https://images.unsplash.com/photo-1581636625402-29b2a704ef13?auto=format&fit=crop&w=600&q=80',coke:'https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&w=600&q=80'};const fallback=photos.xtudo;const menu={burgers:[['X Tudo Bruto','Hambúrguer completo com queijo, bacon, ovo, salada e molho especial.',29.90,photos.xtudo,'Mais pedido'],['X Bacon','Burger com queijo, bacon crocante, salada e molho da casa.',24.90,photos.xbacon,'Top'],['Obará Gourmet','Burger artesanal com queijo, salada, cebola e molho especial Obará.',32.90,photos.gourmet,'Gourmet'],['Seu Burguer Favorito','Hambúrguer artesanal da casa, preparado no capricho.',27.90,photos.comboBurger,'']],combos:[['Combo X Bacon','X Bacon + fritas + refrigerante lat ass="grid">${menu[c[0]].map(card).join('')}</div></div></section>`).join('');let obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-cat="${e.target.id}"]`)?.classList.add('active')}}),{threshold:.25});cats.forEach(c=>obs.observe(document.getElementById(c[0])))}function card(it){return`<article class="item" id="card-${it.id}"><div class="pic"><img src="${it.photo}" alt="${it.name}" onerror="this.src='${fallback}'"></div><div><div class="name-row"><div class="name">${it.name}</div>${it.badge?`<span class="badge">${it.badge}</span>`:''}</div><div class="desc">${it.desc}</div><div class="foot"><div class="price">${fmt(it.price)}</div><div id="act-${it.id}"><button class="add" onclick="add(${it.id})">+ Adicionar</button></div></div></div></article>`}function go(id){document.getElementById(id).scrollIntoView({behavior:'smooth'})}function find(id){return items.find(x=>x.id==id)}function add(id){cart[id]=(cart[id]||0)+1;sync(id);fab()}function rem(id){if(!cart[id])return;cart[id]--;if(cart[id]<=0)delete cart[id];sync(id);fab()}function sync(id){let q=cart[id]||0,a=document.getElementById('act-'+id),c=document.getElementById('card-'+id);if(!a)return;if(q){a.innerHTML=`<div class="qty"><button onclick="rem(${id})">−</button><span>${q}</span><button onclick="add(${id})">+</button></div>`;c.classList.add('in')}else{a.innerHTML=`<button class="add" onclick="add(${id})">+ Adicionar</button>`;c.classList.remove('in')}}function total(){return Object.entries(cart).reduce((s,[id,q])=>s+find(+id).price*q,0)}function count(){return Object.values(cart).reduce((a,b)=>a+b,0)}function fab(){let n=count();document.getElementById('count').textContent=n;document.getElementById('fabTotal').textContent=fmt(total());document.getElementById('fab').classList.toggle('hide',!n)}function openCart(){sheet();overlay.classList.add('show');document.body.style.overflow='hidden'}function closeCart(){overlay.classList.remove('show');document.body.style.overflow=''}function outsideClose(e){if(e.target.id==='overlay')closeCart()}function setDelivery(x){delivery=x;sheet()}function setPay(x){payment=x;sheet()}function cartQty(id,d){d>0?add(id):rem(id);sheet();fab()}function sheet(){let b=sheetBody;if(!count()){b.innerHTML='<div class="empty">🍔<br>Nada no pedido ainda.</div>';return}b.innerHTML=Object.entries(cart).map(([id,q])=>{let it=find(+id);return`<div class="cart-item"><img class="cart-photo" src="${it.photo}" onerror="this.src='${fallback}'"><div class="cart-info"><div class="cart-name">${it.name}</div><div class="cart-unit">${fmt(it.price)} cada</div></div><div class="ci"><button onclick="cartQty(${id},-1)">−</button><span>${q}</span><button onclick="cartQty(${id},1)">+</button></div><div class="subtot">${fmt(it.price*q)}</div></div>`}).join('')+`<div class="field"><div class="label">👤 Seu nome</div><input id="name" class="input" placeholder="Como devemos te chamar?"></div><div class="field"><div class="label">🛵 Tipo de pedido</div><div class="toggle"><button class="${delivery==='entrega'?'active':''}" onclick="setDelivery('entrega')">Entrega</button><button class="${delivery==='retirada'?'active':''}" onclick="setDelivery('retirada')">Retirada</button></div>${delivery==='entrega'?'<div style="margin-top:10px"><input id="addr" class="input" placeholder="Rua, número, bairro e complemento"></div>':''}</div><div class="field"><div class="label">💳 Pagamento</div><div class="pay">${['dinheiro','pix','credito','debito'].map(p=>`<button class="${payment===p?'active':''}" onclick="setPay('${p}')">${p==='credito'?'crédito':p}</button>`).join('')}</div></div><div class="field"><div class="label">📝 Observações</div><textarea id="notes" class="input" placeholder="Ex: sem cebola, ponto da carne, retirar molho..."></textarea></div><div class="field"><div class="row"><span>Subtotal</span><span>${fmt(total())}</span></div><div class="row"><span>Entrega</span><span>Consultar</span></div><div class="row grand"><span>Total dos itens</span><b>${fmt(total())}</b></div></div><button class="wa" onclick="sendWA()">Fazer pedido pelo WhatsApp</button>`}function sendWA(){let n=document.getElementById('name')?.value.trim(),a=document.getElementById('addr')?.value.trim(),notes=document.getElementById('notes')?.value.trim();if(!n)return alert('Informe seu nome.');if(delivery==='entrega'&&!a)return alert('Informe o endereço.');if(!payment)return alert('Escolha o pagamento.');let labels={dinheiro:'Dinheiro',pix:'Pix',credito:'Cartão de crédito',debito:'Cartão de débito'},lines=Object.entries(cart).map(([id,q])=>{let it=find(+id);return`• ${q}x ${it.name} — ${fmt(it.price*q)}`}).join('\n');let msg=`🍔 *NOVO PEDIDO — ${CFG.loja.toUpperCase()}*\n\n👤 *Cliente:* ${n}\n🛵 *Tipo:* ${delivery==='entrega'?'Entrega':'Retirada'}\n${delivery==='entrega'?'📍 *Endereço:* '+a+'\n':''}\n📋 *Itens:*\n${lines}\n\n${notes?'📝 *Obs:* '+notes+'\n\n':''}🧾 *Total dos itens:* ${fmt(total())}\n🛵 *Entrega:* consultar\n💳 *Pagamento:* ${labels[payment]}`;window.open(`https://wa.me/${CFG.whatsapp}?text=${encodeURIComponent(msg)}`,'_blank')}status();setInterval(status,60000);render();
</script></body></html>
